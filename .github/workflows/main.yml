name: Bot Relatorio PowerBI

on:
  schedule:
    # Agendamento cron: roda de Segunda a Sexta às 08:00 do horário de Brasília (11:00 UTC)
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Mantém o botão cinza "Run workflow" ativo para disparar manualmente

jobs:
  rodar-automacao:
    runs-on: ubuntu-latest
    
    # Variável de ambiente global do Job para forçar a nova versão do Node.js exigida pelo GitHub
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Puxar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Instalar o ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias do requirements.txt
        run: pip install -r requirements.txt

      - name: Executar o Script Python
        env:
          # Associa a senha guardada no cofre do GitHub ('Secrets') para dentro do código Python
          SENHA_EMAIL: ${{ secrets.SENHA_EMAIL }}
        run: python relatorio_salesco.py
