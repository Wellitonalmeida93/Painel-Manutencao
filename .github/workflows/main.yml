name: Relatorio Diario Salesco

on:
  schedule:
    # Roda de segunda a sexta-feira (1-5) às 17:30 de Brasília (20:30 UTC)
    - cron: '30 20 * * 1-5'
  
  # Mantém o botão para disparo manual no GitHub
  workflow_dispatch:

jobs:
  executar-relatorio:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixar código do repositório
      uses: actions/checkout@v4

    - name: 2. Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalar dependências e navegadores
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install --with-deps chromium

    - name: 4. Localizar e executar o script
      env:
        SENHA_EMAIL: ${{ secrets.SENHA_EMAIL }}
      run: |
        # Localiza o arquivo relatorio.py em qualquer diretório e o executa
        ARQUIVO_PY=$(find . -name "relatorio.py" -print -quit)
        if [ -z "$ARQUIVO_PY" ]; then
          echo "❌ ERRO: O arquivo relatorio.py não foi encontrado em nenhuma pasta!"
          exit 1
        fi
        echo "🚀 Executando: $ARQUIVO_PY"
        python "$ARQUIVO_PY"
